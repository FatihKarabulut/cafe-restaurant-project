<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background:#0f172a; color:#e2e8f0; }
        .glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(12px); border-radius:16px; }
        .sidebar { width:250px; }
        .sidebar a { cursor:pointer; }
        .sidebar a:hover { background:rgba(255,255,255,0.08); }
        .hidden { display:none; }
    </style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar glass h-screen p-4 hidden md:block">
    <h4 class="mb-4">Enterprise Admin</h4>
    <a onclick="showPage('dashboard')" class="d-block p-2">Dashboard</a>
    <a onclick="showPage('products')" class="d-block p-2">Products</a>
    <a onclick="showPage('users')" class="d-block p-2">Users</a>
    <a onclick="logout()" class="d-block p-2 text-danger">Logout</a>
</div>

<div class="flex-1 p-6">

    <!-- LOGIN -->
    <div id="loginPage" class="flex items-center justify-center h-screen">
        <div class="glass p-6 w-96">
            <h4>Login</h4>
            <input id="loginUser" class="form-control mb-2" placeholder="Username">
            <input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">
            <button onclick="login()" class="btn btn-primary w-100">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <!-- DASHBOARD -->
    <div id="dashboardPage" class="hidden">
        <h2 class="mb-4">Dashboard</h2>

        <!-- KPI CARDS -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="glass p-3 text-center">
                    <h6 class="text-gray-400 mb-2">Total Products</h6>
                    <h3 id="kpiProducts">0</h3>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="glass p-3 text-center">
                    <h6 class="text-gray-400 mb-2">Total Revenue</h6>
                    <h3 id="kpiRevenue">0 ₺</h3>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="glass p-3 text-center">
                    <h6 class="text-gray-400 mb-2">Categories</h6>
                    <h3 id="kpiCategories">0</h3>
                </div>
            </div>
        </div>

        <!-- CATEGORY CHART -->
        <div class="glass p-3 mb-4" style="max-height:280px;">
            <h6 class="mb-2 text-gray-400">Category Distribution</h6>
            <div class="h-56">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- LAST 5 PRODUCTS -->
        <div class="glass p-3">
            <h6 class="mb-2 text-gray-400">Last 5 Products</h6>
            <div id="recentProducts"></div>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div id="productsPage" class="hidden">
        <h2 class="mb-3">Products</h2>

        <div class="glass p-3 mb-3">
            <input id="pName" class="form-control mb-2" placeholder="Name">
            <input id="pImg" class="form-control mb-2" placeholder="Image URL">
            <input id="pPrice" type="number" class="form-control mb-2" placeholder="Price">
            <select id="pCategory" class="form-control mb-2">
                <option>hot</option>
                <option>cold</option>
                <option>dessert</option>
                <option>meal</option>
            </select>
            <button onclick="saveProduct()" class="btn btn-success w-100">Save Product</button>
        </div>

        <div id="productsTable" class="glass p-3"></div>
    </div>

    <!-- USERS -->
    <div id="usersPage" class="hidden">
        <h2 class="mb-3">Create User</h2>

        <div class="glass p-3">
            <input id="uName" class="form-control mb-2" placeholder="Username">
            <input id="uPass" class="form-control mb-2" placeholder="Password">
            <select id="uRole" class="form-control mb-2">
                <option>admin</option>
                <option>user</option>
            </select>
            <button onclick="saveUser()" class="btn btn-warning w-100">Save User</button>
        </div>
    </div>

</div>

<!-- UPDATE MODAL -->
<div class="modal fade" id="updateModal">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5 class="modal-title">Update Price</h5>
            </div>
            <div class="modal-body">
                <input id="modalPrice" class="form-control">
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="confirmUpdate()">Save</button>
            </div>
        </div>
    </div>
</div>

<script>

    const API="http://localhost:7272"
    let currentProduct=null
    let chartInstance=null

    async function apiFetch(url,options={}){
        options.credentials="include"
        let res=await fetch(API+url,options)
        if(res.status===401){
            const refresh=await fetch(API+"/refreshToken",{credentials:"include"})
            if(refresh.ok){
                res=await fetch(API+url,options)
            }else location.reload()
        }
        return res
    }

    function showPage(p){
        ["dashboard","products","users"].forEach(x=>{
            document.getElementById(x+"Page").classList.add("hidden")
        })
        document.getElementById(p+"Page").classList.remove("hidden")
    }

    async function login(){
        const res=await fetch(API+"/login",{
            method:"POST",
            credentials:"include",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                username:loginUser.value,
                password:loginPass.value
            })
        })
        if(res.ok){
            loginPage.classList.add("hidden")
            sidebar.classList.remove("hidden")
            await initApp()
        }else alert("Login failed")
    }

    async function initApp(){
        await loadProducts()
        await loadDashboard()
        showPage("dashboard")
    }

    async function loadProducts(){
        const res=await apiFetch("/findByProduct")
        const data=await res.json()

        let html=`<table class="table table-dark">
<tr><th>Name</th><th>Price</th><th>Category</th><th>Edit</th><th>Delete</th></tr>`

        data.forEach(p=>{
            html+=`
<tr>
<td>${p.products_name}</td>
<td>${p.products_price}</td>
<td>${p.products_category}</td>
<td><button class="btn btn-warning btn-sm"
onclick="openModal('${p.products_name}','${p.products_price}')">Edit</button></td>
<td><button class="btn btn-danger btn-sm"
onclick="deleteProduct('${p.products_name}')">Delete</button></td>
</tr>`
        })
        html+=`</table>`
        productsTable.innerHTML=html
    }

    async function loadDashboard(){
        const res=await apiFetch("/findByProduct")
        const products=await res.json()

        kpiProducts.innerText=products.length

        const revenue=products.reduce((acc,p)=>acc+Number(p.products_price),0)
        kpiRevenue.innerText=revenue+" ₺"

        const categories={}
        products.forEach(p=>{
            categories[p.products_category]=(categories[p.products_category]||0)+1
        })

        kpiCategories.innerText=Object.keys(categories).length

        if(chartInstance) chartInstance.destroy()

        chartInstance=new Chart(categoryChart,{
            type:"doughnut",
            data:{
                labels:Object.keys(categories),
                datasets:[{
                    data:Object.values(categories),
                    backgroundColor:["#6366f1","#22c55e","#f59e0b","#ef4444"]
                }]
            }
        })

        recentProducts.innerHTML="<ul>"+products.slice(-5).map(p=>
            `<li>${p.products_name} - ${p.products_price} ₺</li>`
        ).join("")+"</ul>"
    }

    async function saveProduct(){
        await apiFetch("/products",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                products_name:pName.value,
                products_img:pImg.value,
                products_price:pPrice.value,
                products_category:pCategory.value
            })
        })
        await loadProducts()
        await loadDashboard()
    }

    function openModal(name,price){
        currentProduct=name
        modalPrice.value=price
        new bootstrap.Modal(updateModal).show()
    }

    async function confirmUpdate(){
        await apiFetch("/updatePrice",{
            method:"PATCH",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({price:modalPrice.value,productName:currentProduct})
        })
        bootstrap.Modal.getInstance(updateModal).hide()
        await loadProducts()
        await loadDashboard()
    }

    async function deleteProduct(name){
        await apiFetch("/deleteByName",{
            method:"DELETE",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name})
        })
        await loadProducts()
        await loadDashboard()
    }

    async function saveUser(){
        await apiFetch("/userSave",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                users_name:uName.value,
                users_password:uPass.value,
                users_role:uRole.value
            })
        })
        alert("User saved")
        uName.value=""
        uPass.value=""
    }

    async function logout(){
        await apiFetch("/logout")
        location.reload()
    }

</script>
</body>
</html>
